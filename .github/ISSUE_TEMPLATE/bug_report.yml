name: Bug report
description: Report unexpected or broken behavior in @ezoic/vue-sdk
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the
        details below so we can reproduce and fix it.
  - type: input
    id: sdk-version
    attributes:
      label: '@ezoic/vue-sdk version'
      description: The version of the SDK you're using
      placeholder: '0.1.0'
    validations:
      required: true
  - type: input
    id: vue-version
    attributes:
      label: Vue version
      placeholder: '3.5.0'
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - SPA
        - SSR (Nuxt)
        - Plain Vue
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console errors / logs
      render: shell
    validations:
      required: false
