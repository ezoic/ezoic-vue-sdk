name: CI

on:
  push:
    branches: [master]
  pull_request:

# Least privilege by default; CI only needs to read the repository.
permissions:
  contents: read

jobs:
  build:
    name: lint · test · build (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm pack --dry-run
